name: Deploy Cottage Color (PWA) to GitHub Pages

# Publishes the whole repository as a static PWA site. One-time setup in the repo:
#   Settings → Pages → Build and deployment → Source: "GitHub Actions".
# After that, every push to main redeploys. URL:
#   https://<owner>.github.io/cottage-color-game/

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
